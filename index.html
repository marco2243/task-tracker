<!DOCTYPE html>
<html>
<head>
  <title>Task Tracker Pro</title>
</head>

<body>

<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<h2>Tasks</h2>
<input id="taskInput" placeholder="New task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_ec5pnBX7Hk7AarHtPtRXaMrF5qD09n8",
  authDomain: "task-tracker-pro-3948c.firebaseapp.com",
  projectId: "task-tracker-pro-3948c",
  storageBucket: "task-tracker-pro-3948c.firebasestorage.app",
  messagingSenderId: "835312102863",
  appId: "1:835312102863:web:d301ddcb4c40522e736ba",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

window.signup = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  await createUserWithEmailAndPassword(auth, email, pass);
  alert("User created!");
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  const res = await signInWithEmailAndPassword(auth, email, pass);
  user = res.user;
  loadTasks();
};

window.addTask = async () => {
  const text = document.getElementById("taskInput").value;
  if (!user) return alert("Login first");

  await addDoc(collection(db, "tasks"), {
    text,
    uid: user.uid
  });

  loadTasks();
};

async function loadTasks() {
  const querySnapshot = await getDocs(collection(db, "tasks"));
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    if (data.uid === user.uid) {
      const li = document.createElement("li");
      li.textContent = data.text;
      list.appendChild(li);
    }
  });
}
</script>

</body>
</html>
