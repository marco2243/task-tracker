<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Tracker Pro</title>

<style>
  body {
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    margin-top: 40px;
  }

  .container {
    width: 380px;
    background: #1e1e1e;
    padding: 20px;
    border-radius: 12px;
  }

  h1 {
    text-align: center;
  }

  input, button {
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
  }

  input {
    width: 60%;
  }

  input[type="date"] {
    width: 35%;
  }

  button {
    background: orange;
    color: black;
    cursor: pointer;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    background: #2a2a2a;
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
  }

  .task-top {
    display: flex;
    justify-content: space-between;
  }

  .completed {
    text-decoration: line-through;
    color: gray;
  }

  .date {
    font-size: 12px;
    color: #bbb;
  }

  .toggle-btn {
    margin-top: 10px;
    background: #444;
    color: white;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Task Tracker 🚀</h1>

  <input type="text" id="taskInput" placeholder="Enter task">
  <input type="date" id="dateInput">
  <button onclick="addTask()">Add</button>

  <button class="toggle-btn" onclick="toggleMode()">Toggle Dark/Light</button>

  <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let darkMode = true;

function renderTasks() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((task, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <div class="task-top">
        <span onclick="toggleTask(${index})" class="${task.done ? 'completed' : ''}">
          ${task.text}
        </span>
        <button onclick="deleteTask(${index})">❌</button>
      </div>
      <div class="date">Due: ${task.date || "No date"}</div>
    `;

    list.appendChild(li);
  });
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const date = document.getElementById("dateInput").value;

  if (text.trim() === "") return;

  tasks.push({ text, date, done: false });

  document.getElementById("taskInput").value = "";
  document.getElementById("dateInput").value = "";

  saveTasks();
}

function toggleTask(index) {
  tasks[index].done = !tasks[index].done;
  saveTasks();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  saveTasks();
}

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
  renderTasks();
}

function toggleMode() {
  darkMode = !darkMode;
  document.body.style.background = darkMode ? "#111" : "#f5f5f5";
  document.body.style.color = darkMode ? "white" : "black";
}

renderTasks();
</script>

</body>
</html>
